version: "3.9"

services:

  backend:
    build: ./backend
    container_name: auchencore-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    restart: always

  frontend:
    build: ./frontend
    container_name: auchencore-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always